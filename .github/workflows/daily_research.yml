name: Daily Gemini Deep Research

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  research:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Deep Research
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        RESEARCH_AGENT: ${{ vars.RESEARCH_AGENT || 'latest-pro' }}
        # GitHub URL of the prompt. You can also set this as a secret or variable.
        PROMPT_URL: ${{ vars.PROMPT_URL }} 
        HTML_PROMPT_URL: ${{ vars.HTML_PROMPT_URL || 'https://github.com/ancm777-eng/AInews/blob/main/prompt/html.txt' }}
      run: |
        # If PROMPT_URL is not set as a variable, you can hardcode it here
        python main.py --url "$PROMPT_URL" --agent "$RESEARCH_AGENT" --output "trial/1.txt"

    - name: Commit and push results (Optional)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add trial/1.txt trial/feedback.txt trial/2.txt index.html data/*.txt
        git commit -m "chore: update research (v1, v2), feedback, index.html and archive data" || echo "No changes to commit"
        git push
