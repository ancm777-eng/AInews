name: Daily Gemini Deep Research

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Future-proof against Node 20 deprecation

jobs:
  research:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allow the bot to push changes

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Deep Research
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        RESEARCH_AGENT: ${{ vars.RESEARCH_AGENT || 'latest-pro' }}
        # GitHub URL of the prompt. You can also set this as a secret or variable.
        PROMPT_URL: ${{ vars.PROMPT_URL }} 
        HTML_PROMPT_URL: ${{ vars.HTML_PROMPT_URL || 'https://github.com/ancm777-eng/AInews/blob/main/prompt/html.txt' }}
      run: |
        # If PROMPT_URL is not set as a variable, you can hardcode it here
        python main.py --url "$PROMPT_URL" --agent "$RESEARCH_AGENT" --output "trial/1.txt"

    - name: Commit and push results
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        if git commit -m "chore: update daily research and archives"; then
          git push
        else
          echo "No changes to commit, skipping push."
        fi
