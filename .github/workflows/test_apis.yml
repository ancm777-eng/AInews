name: API Connection Test (Minimal Cost)

on:
  workflow_dispatch: # Allows manual trigger

jobs:
  test_apis:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-genai anthropic python-dotenv

    - name: Test Gemini API
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python test_gemini_minimal.py

    - name: Test Claude API
      env:
        CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      run: |
        python test_claude_minimal.py
        
    - name: Test Claude API via Requests
      env:
        CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      run: |
        python test_claude_requests.py
