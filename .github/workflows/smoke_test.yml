name: Smoke Test Pipeline

# 원할 때 수동으로 버튼을 눌러 실행할 수 있도록 설정
on:
  workflow_dispatch: 

jobs:
  run-test:
    runs-on: ubuntu-latest

    steps:
      # 1. 리포지토리의 코드를 가상 환경으로 가져옴
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 파이썬 환경 설정
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 필요한 패키지 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. API 키를 주입하고 스모크 테스트 실행
      - name: Run Smoke Test
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python test_pipeline.py

      # 5. 생성된 텍스트 파일과 HTML 결과를 압축해서 다운로드할 수 있게 업로드
      - name: Upload Test Results
        if: always() # 테스트가 실패해도 지금까지 만들어진 파일은 업로드함
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            trial/
            data/
            index.html

# 결과물을 리포지토리에 직접 업데이트 (Commit & Push)
      - name: Commit and Push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 이미지에 있는 trial 폴더, data 폴더, index.html의 변경사항을 추적
          git add trial/ data/ index.html
          
          # 변경된 파일이 있는지 확인
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update AI news results"
            
            # (핵심) 깃허브의 최신 상태를 먼저 가져와서 병합 충돌을 방지함
            git pull --rebase origin main
            
            git push
          else
            echo "No changes to commit. Skipping push."
          fi
