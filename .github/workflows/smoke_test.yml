name: Smoke Test Pipeline

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Seoul
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true" # Node.js 20 Deprecated 경고 해결을 위한 강제 설정

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 최신 버전 유지
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Smoke Test
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python test_pipeline.py

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4 # v4로 업데이트하여 Node.js 경고 해결
        with:
          name: smoke-test-artifacts
          path: |
            trial/
            data/
            index.html
