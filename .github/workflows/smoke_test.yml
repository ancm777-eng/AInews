name: Smoke Test Pipeline

on:
  workflow_dispatch: # 수동 실행 버튼

permissions:
  contents: write

jobs:
  run-test:
    runs-on: ubuntu-latest
    
    # [수정] 무한 대기 및 크레딧 소진을 방지하기 위한 안전장치 추가
    timeout-minutes: 5
    
    # 한국 시간 설정
    env:
      TZ: Asia/Seoul

    steps:
      # 1. 리포지토리의 코드를 가상 환경으로 가져옴
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 파이썬 환경 설정
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 필요한 패키지 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. API 키를 주입하고 스모크 테스트 실행
      # 실행 시 현재 시간을 출력에 포함하도록 설정 (업데이트 확인용)
      - name: Run Smoke Test
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python test_pipeline.py

      # 5. 생성된 결과물 업로드 (Artifacts)
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            trial/
            data/
            index.html

      # 6. 결과물을 리포지토리에 직접 업데이트 (Commit & Push)
      - name: Commit and Push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 변경사항 추적
          git add trial/ data/ index.html
          
          # 커밋 메시지에 실행 시간을 포함하여 리포지토리에서 바로 보이게 함
          if ! git diff --staged --quiet; then
            git commit -m "Test update: $(date +'%Y-%m-%d %H:%M:%S KST')"
            git pull --rebase origin main
            git push
          else
            echo "변경 사항이 없습니다. 테스트 데이터가 이전과 동일할 수 있습니다."
          fi
