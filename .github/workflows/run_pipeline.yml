name: Run AI News Pipeline

# 실행 조건 설정
on:
  workflow_dispatch: # 수동 실행 버튼
  schedule:
    # KST 오전 7시부터 오후 12시(정오)까지 매 15분 간격으로 트리거
    # (UTC 기준 22, 23, 0, 1, 2, 3시의 0, 15, 30, 45분)
    # 503 에러 발생 시 서버를 종료하고 15분 뒤 완전히 새롭게 시도합니다.
    # 단 한 번이라도 성공하면, 이후 남은 시간대(15분 간격)는 1초 만에 즉시 스킵됩니다.
    - cron: '*/15 22,23,0,1,2,3 * * *'

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # 메인 파이프라인 무한 대기 방지 (비용 보호)
    
    # 이 작업 내의 모든 단계를 한국 시간 기준으로 설정하고 Node.js 경고 해결
    env:
      TZ: Asia/Seoul
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true" 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Push 충돌 방지를 위해 전체 히스토리를 가져옴
          fetch-depth: 0

      # ⭐️ 핵심: 오늘 날짜의 리포트가 이미 있다면, 파이프라인 전체를 스킵 (비용 0)
      - name: Check if already completed today
        id: check
        run: |
          TODAY=$(date +'%Y-%m-%d')
          if [ -f "data/$TODAY.txt" ]; then
            echo "✅ 오늘($TODAY)자 리포트가 이미 생성되어 있습니다. 불필요한 실행과 비용 소모를 막기 위해 건너뜁니다."
            echo "SKIP_RUN=true" >> $GITHUB_ENV
          else
            echo "🚀 오늘자 리포트가 없습니다. 파이프라인을 시작합니다."
            echo "SKIP_RUN=false" >> $GITHUB_ENV
          fi

      - name: Set up Python
        if: env.SKIP_RUN == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        if: env.SKIP_RUN == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 스크립트 내부의 무한 반복 대기를 지우고, 깔끔하게 1회만 시도
      - name: Run Main Pipeline
        if: env.SKIP_RUN == 'false'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          PROMPT_URL: ${{ secrets.PROMPT_URL }}
          HTML_PROMPT_URL: ${{ secrets.HTML_PROMPT_URL }}
        run: python main.py

      - name: Upload Pipeline Results
        if: always() && env.SKIP_RUN == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ai-news-artifacts
          path: |
            trial/
            data/
            index.html

      # 503 에러로 스크립트가 중단되어도 지금까지 남은 흔적(run_status 등)을 강제 커밋
      - name: Commit and Push results
        if: always() && env.SKIP_RUN == 'false'
        run: |
          # Git 사용자 설정
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 파이프라인 실행 시도를 기록하는 상태 파일 생성 (실패 시에도 무조건 커밋 발생)
          echo "Last Pipeline Run Attempt: $(date +'%Y-%m-%d %H:%M:%S KST')" > run_status.txt
          
          # 변경된 폴더와 파일 추가
          git add trial/ data/ index.html run_status.txt
          
          # 변경사항이 있는 경우만 커밋 및 푸시
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update AI news results ($(date +'%Y-%m-%d %H:%M KST'))"
            
            # 다른 작업과 충돌 방지를 위해 최신본 합치기 후 업로드
            git pull --rebase origin main
            git push
          else
            echo "변경 사항이 없어 업데이트를 건너뜁니다."
          fi
