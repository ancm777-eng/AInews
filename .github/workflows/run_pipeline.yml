name: Run AI News Pipeline

# 실행 조건 설정
on:
  workflow_dispatch: # 수동 실행 버튼
  schedule:
    # KST 오전 7시부터 오후 12시(정오)까지 약 15분 간격으로 트리거하되,
    # 정각/15분/30분/45분의 전 세계적 트래픽 병목을 피하기 위해 분 단위를 비틂
    # 503 에러 발생 시 서버를 즉시 종료하고 다음 주기에 완전히 새롭게 시도하여 비용을 보호합니다.
    - cron: '7,22,37,52 22,23,0,1,2,3 * * *'

permissions:
  contents: write


jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # 메인 파이프라인 무한 대기 방지
    
    env:
      TZ: Asia/Seoul
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true" 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ⭐️ 중복 실행 방지 로직: 오늘자 리포트가 있으면 모든 비용 발생 단계 스킵
      - name: Check if already completed today
        id: check
        run: |
          TODAY=$(date +'%Y-%m-%d')
          if [ -f "data/$TODAY.txt" ]; then
            echo "✅ 오늘($TODAY)자 리포트가 이미 존재합니다. 실행을 건너뜁니다."
            echo "SKIP_RUN=true" >> $GITHUB_ENV
          else
            echo "🚀 오늘자 리포트가 없습니다. 파이프라인을 시작합니다."
            echo "SKIP_RUN=false" >> $GITHUB_ENV
          fi

      - name: Set up Python
        if: env.SKIP_RUN == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        if: env.SKIP_RUN == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Main Pipeline
        if: env.SKIP_RUN == 'false'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          PROMPT_URL: ${{ secrets.PROMPT_URL }}
          HTML_PROMPT_URL: ${{ secrets.HTML_PROMPT_URL }}
        run: python main.py

      - name: Upload Pipeline Results
        if: always() && env.SKIP_RUN == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ai-news-artifacts
          path: |
            trial/
            data/
            index.html
            run_status.txt

      # ⭐️ 실패하든 성공하든 시도 흔적을 무조건 Push (비용 방어 핵심)
      - name: Commit and Push results
        if: always() && env.SKIP_RUN == 'false'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 실행 시각 기록 (커밋 트리거용)
          echo "Last Pipeline Run Attempt: $(date +'%Y-%m-%d %H:%M:%S KST')" > run_status.txt
          
          git add trial/ data/ index.html run_status.txt
          
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update AI news results ($(date +'%Y-%m-%d %H:%M KST'))"
            git pull --rebase origin main
            git push
          else
            echo "변경 사항이 없어 업데이트를 건너뜁니다."
          fi
