name: Run AI News Pipeline

# 원할 때 수동으로 버튼을 눌러 실행할 수 있도록 설정
on:
  workflow_dispatch: # 수동 실행 버튼 유지
  schedule:
    # 한국 시간(KST) 오전 7시는 UTC 기준 이전 날짜 오후 10시입니다.
    # 분 시 일 월 요일 순서입니다.
    - cron: '0 22 * * *'

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. 리포지토리의 코드를 가상 환경으로 가져옴
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 파이썬 환경 설정
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 필요한 패키지 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. API 키를 주입하고 실제 메인 파이프라인(main.py) 실행
      - name: Run Main Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          # main.py에서 사용하는 프롬프트 URL을 직접 적어주거나, Secrets에 등록 후 불러올 수 있습니다.
          # 예시: PROMPT_URL: "https://raw.githubusercontent.com/.../news.txt"
          PROMPT_URL: ${{ secrets.PROMPT_URL }}
          HTML_PROMPT_URL: ${{ secrets.HTML_PROMPT_URL }}
        run: python main.py

      # 5. 결과물을 내 리포지토리 소스 코드에 직접 저장 (Commit & Push)
      - name: Commit and Push results
        run: |
          # 봇 이름으로 Git 계정 설정
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # trial 폴더, data 폴더, index.html의 변경사항 추적
          git add trial/ data/ index.html
          
          # 변경된 내용이 있을 때만 덮어쓰기(Commit) 후 리포지토리에 업로드(Push)
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update AI news results" && git push)
