name: Run AI News Pipeline

# 실행 조건 설정
on:
  workflow_dispatch: # 수동 실행 버튼
  schedule:
    # KST 오전 6시 반부터 9시까지 약 30분 간격으로 트리거하되,
    # 정각/30분의 전 세계적 트래픽 병목을 피하기 위해 7분/37분으로 분 단위를 비틂
    # 503 에러 발생 시 서버를 즉시 종료하고 다음 주기에 완전히 새롭게 시도하여 비용을 보호합니다.
    - cron: '37 21 * * *'       # KST 06:37 (UTC 21:37)
    - cron: '7,37 22,23 * * *'  # KST 07:07, 07:37, 08:07, 08:37 (UTC 22시, 23시)
    - cron: '7 0 * * *'         # KST 09:07 (UTC 00:07)

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # 메인 파이프라인 무한 대기 방지
    
    env:
      TZ: Asia/Seoul
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true" 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ⭐️ 중복 실행 방지 로직: 오늘자 리포트가 있으면 모든 비용 발생 단계 스킵
      - name: Check if already completed today
        id: check
        run: |
          TODAY=$(date +'%Y-%m-%d')
          if [ -f "data/$TODAY.txt" ]; then
            echo "✅ 오늘($TODAY)자 리포트가 이미 존재합니다. 실행을 건너뜁니다."
            echo "SKIP_RUN=true" >> $GITHUB_ENV
          else
            echo "🚀 오늘자 리포트가 없습니다. 파이프라인을 시작합니다."
            echo "SKIP_RUN=false" >> $GITHUB_ENV
          fi

      - name: Set up Python
        if: env.SKIP_RUN == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        if: env.SKIP_RUN == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ⭐️ 추가된 로직: Git 커밋 날짜를 확인하여 오늘 만들어진 캐시는 보존하고, 어제 이전 캐시만 삭제
      - name: Clean old caches (Preserve today's partial progress)
        if: env.SKIP_RUN == 'false'
        run: |
          TODAY=$(date +'%Y-%m-%d')
          echo "Current Date (KST): $TODAY"
          
          if [ -d "trial" ]; then
            for file in trial/*.txt; do
              if [ -f "$file" ]; then
                # 해당 파일이 마지막으로 커밋된 날짜 추출 (형식: YYYY-MM-DD)
                COMMIT_DATE=$(git log -1 --date=format:'%Y-%m-%d' --format="%cd" -- "$file")
                
                # 파일이 Git에 추적되고 있으며, 커밋 날짜가 오늘이 아닌 경우에만 삭제
                if [ -n "$COMMIT_DATE" ] && [ "$COMMIT_DATE" != "$TODAY" ]; then
                  echo "🧹 이전 날짜 캐시 파일 삭제: $file (커밋 날짜: $COMMIT_DATE)"
                  rm "$file"
                else
                  echo "✅ 오늘 생성/수정된 캐시 유지: $file (커밋 날짜: $COMMIT_DATE)"
                fi
              fi
            done
          fi

      - name: Run Main Pipeline
        if: env.SKIP_RUN == 'false'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          PROMPT_URL: ${{ secrets.PROMPT_URL }}
          HTML_PROMPT_URL: ${{ secrets.HTML_PROMPT_URL }}
        run: python main.py

      - name: Upload Pipeline Results
        if: always() && env.SKIP_RUN == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ai-news-artifacts
          path: |
            trial/
            data/
            index.html
            run_status.txt

      # ⭐️ 실패하든 성공하든 시도 흔적을 무조건 Push (비용 방어 핵심)
      - name: Commit and Push results
        if: always() && env.SKIP_RUN == 'false'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 실행 시각 기록 (커밋 트리거용)
          echo "Last Pipeline Run Attempt: $(date +'%Y-%m-%d %H:%M:%S KST')" > run_status.txt
          
          git add trial/ data/ index.html run_status.txt
          
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update AI news results ($(date +'%Y-%m-%d %H:%M KST'))"
            git pull --rebase origin main
            git push
          else
            echo "변경 사항이 없어 업데이트를 건너뜁니다."
          fi
