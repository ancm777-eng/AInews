name: Run AI News Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '37 21 * * *'
    - cron: '7,37 22,23 * * *'
    - cron: '7 0 * * *'

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    env:
      TZ: Asia/Seoul
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true" 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if already completed today
        id: check
        run: |
          TODAY=$(date +'%Y-%m-%d')
          if [ -f "data/$TODAY.txt" ]; then
            echo "✅ 오늘($TODAY)자 리포트가 이미 존재합니다. 실행을 건너뜁니다."
            echo "SKIP_RUN=true" >> $GITHUB_ENV
          else
            echo "🚀 오늘자 리포트가 없습니다. 파이프라인을 시작합니다."
            echo "SKIP_RUN=false" >> $GITHUB_ENV
          fi

      - name: Set up Python
        if: env.SKIP_RUN == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        if: env.SKIP_RUN == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ⭐️ 수정된 로직: Git 커밋 날짜를 기준으로 어제 이전의 캐시만 삭제 (오늘의 부분 성과는 보존)
      - name: Clean old caches (Preserve today's partial progress)
        if: env.SKIP_RUN == 'false'
        run: |
          TODAY=$(date +'%Y-%m-%d')
          if [ -d "trial" ]; then
            for file in trial/*.txt; do
              if [ -f "$file" ]; then
                COMMIT_DATE=$(git log -1 --date=format:'%Y-%m-%d' --format="%cd" -- "$file")
                if [ -n "$COMMIT_DATE" ] && [ "$COMMIT_DATE" != "$TODAY" ]; then
                  echo "🧹 어제 이전 캐시 삭제: $file ($COMMIT_DATE)"
                  rm "$file"
                fi
              fi
            done
          fi

      - name: Run Main Pipeline
        if: env.SKIP_RUN == 'false'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          PROMPT_URL: ${{ secrets.PROMPT_URL }}
          HTML_PROMPT_URL: ${{ secrets.HTML_PROMPT_URL }}
        run: python main.py

      - name: Upload Pipeline Results
        if: always() && env.SKIP_RUN == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ai-news-artifacts
          path: |
            trial/
            data/
            index.html
            run_status.txt
            ref.txt

      - name: Commit and Push results
        if: always() && env.SKIP_RUN == 'false'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last Pipeline Run Attempt: $(date +'%Y-%m-%d %H:%M:%S KST')" > run_status.txt
          
          # ⭐️ ref.txt를 add 대상에 추가하여 비워진 상태를 저장소에 반영
          git add trial/ data/ index.html run_status.txt ref.txt
          
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update AI news results ($(date +'%Y-%m-%d %H:%M KST'))"
            git pull --rebase origin main
            git push
          else
            echo "변경 사항이 없어 업데이트를 건너뜁니다."
          fi
