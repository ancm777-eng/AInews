name: Run AI News Pipeline

# 실행 조건 설정
on:
  workflow_dispatch: # 수동 실행 버튼
  schedule:
    # 한국 시간(KST) 오전 7시 실행 (UTC 기준 이전 날짜 오후 10시)
    - cron: '0 22 * * *'

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # 메인 파이프라인 무한 대기 방지 (비용 보호)
    
    # 이 작업 내의 모든 단계를 한국 시간 기준으로 설정하고 Node.js 경고 해결
    env:
      TZ: Asia/Seoul
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true" 

    steps:
      # 1. 리포지토리 코드를 가상 환경으로 가져옴
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Push 충돌 방지를 위해 전체 히스토리를 가져옴
          fetch-depth: 0

      # 2. 파이썬 환경 설정
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 필요한 패키지 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. API 키를 주입하고 실제 메인 파이프라인(main.py) 실행
      - name: Run Main Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          PROMPT_URL: ${{ secrets.PROMPT_URL }}
          HTML_PROMPT_URL: ${{ secrets.HTML_PROMPT_URL }}
        run: python main.py

      # 5. 실행 결과물 아티팩트 업로드 (디버깅용)
      - name: Upload Pipeline Results
        if: always() # 스크립트 에러 발생 시에도 생성된 파일들 보존
        uses: actions/upload-artifact@v4
        with:
          name: ai-news-artifacts
          path: |
            trial/
            data/
            index.html

      # 6. 결과물을 내 리포지토리에 저장 (내용이 바뀐 경우만)
      - name: Commit and Push results
        if: always() # 503 에러 등 스크립트 중단 시에도 확보된 파일 무조건 푸시
        run: |
          # Git 사용자 설정
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 변경된 폴더와 파일 추가
          git add trial/ data/ index.html
          
          # 변경사항이 있는 경우만 커밋 및 푸시
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update AI news results ($(date +'%Y-%m-%d %H:%M KST'))"
            
            # 다른 작업과 충돌 방지를 위해 최신본 합치기 후 업로드
            git pull --rebase origin main
            git push
          else
            echo "변경 사항이 없어 업데이트를 건너뜁니다."
          fi
